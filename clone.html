<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dino Game</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f7f7f7;
}

#game{
    width:800px;
    height:250px;
    border:2px solid black;
    margin:auto;
    position:relative;
    overflow:hidden;
    background:white;
}

#dino{
    width:50px;
    height:50px;
    background:#444;
    position:absolute;
    bottom:0;
    left:80px;
    border-radius:5px;
}

.cactus{
    width:25px;
    height:50px;
    background:green;
    position:absolute;
    bottom:0;
}

.cloud{
    width:60px;
    height:30px;
    background:#ddd;
    position:absolute;
    top:40px;
    border-radius:20px;
}

.jump{
    animation:jump 0.45s;
}

@keyframes jump{
    0%{bottom:0;}
    50%{bottom:110px;}
    100%{bottom:0;}
}
</style>
</head>

<body>

<h1>🦖 Dino Game</h1>
<p>Pontos: <span id="score">0</span></p>
<p>Pressione ESPAÇO para pular</p>

<div id="game">
<div id="dino"></div>
</div>

<script>

const game = document.getElementById("game")
const dino = document.getElementById("dino")
const scoreText = document.getElementById("score")

let score = 0
let speed = 6

function jump(){
    if(!dino.classList.contains("jump")){
        dino.classList.add("jump")
        setTimeout(()=>dino.classList.remove("jump"),450)
    }
}

document.addEventListener("keydown",(e)=>{
    if(e.code === "Space"){
        jump()
    }
})

function createCactus(){

    const cactus = document.createElement("div")
    cactus.classList.add("cactus")

    let pos = 800
    cactus.style.left = pos + "px"

    game.appendChild(cactus)

    let move = setInterval(()=>{

        pos -= speed
        cactus.style.left = pos + "px"

        let dinoBottom = parseInt(window.getComputedStyle(dino).bottom)

        if(pos < 130 && pos > 80 && dinoBottom < 40){
            alert("💀 Game Over! Pontos: " + score)
            location.reload()
        }

        if(pos < -30){
            cactus.remove()
            clearInterval(move)
            score++
            scoreText.innerText = score

            if(score % 5 === 0){
                speed++
            }
        }

    },20)
}

function createCloud(){

    const cloud = document.createElement("div")
    cloud.classList.add("cloud")

    let pos = 800
    let top = Math.random()*80 + 20

    cloud.style.left = pos + "px"
    cloud.style.top = top + "px"

    game.appendChild(cloud)

    let move = setInterval(()=>{

        pos -= 2
        cloud.style.left = pos + "px"

        if(pos < -60){
            cloud.remove()
            clearInterval(move)
        }

    },30)
}

setInterval(createCactus,2000)
setInterval(createCloud,3000)

</script>

</body>
</html>
